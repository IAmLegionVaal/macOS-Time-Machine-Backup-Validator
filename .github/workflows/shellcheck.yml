name: Bash validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: find src -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - run: find src -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
